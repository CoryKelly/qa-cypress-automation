name: Cypress E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Cypress repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cypress dependencies
        run: npm install


      - name: Clone API repo
        run: git clone https://github.com/CoryKelly/qa-testing-playground-api ../api

      - name: Install API dependencies
        working-directory: ../api
        run: npm install


      - name: Clone UI repo
        run: git clone https://github.com/CoryKelly/qa-testing-playground-ui ../ui

      - name: Install UI dependencies
        working-directory: ../ui
        run: npm install


      - name: Start API + UI and run Cypress
        run: |
          npx start-server-and-test \
          "npm run dev --prefix ../api" http://localhost:3000 \
          "npm run dev --prefix ../ui -- --host" http://localhost:5173 \
          "npx cypress run"